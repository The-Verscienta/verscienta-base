name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'services/**'
      - '.github/workflows/deploy-backend.yml'

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  # --- 1. Build and push Drupal image -----------------------------------------
  build-drupal:
    name: Build & Push Drupal Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/verscienta-backend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- 2. Build and push SymPy compute service --------------------------------
  build-sympy:
    name: Build & Push SymPy Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/verscienta-sympy
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./services/sympy-compute
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- 3. Trigger Coolify to redeploy -----------------------------------------
  deploy:
    name: Trigger Coolify Deployment
    runs-on: ubuntu-latest
    needs: [build-drupal, build-sympy]
    environment: production

    steps:
      - name: Trigger Coolify backend webhook
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_BACKEND_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          response=$(curl -s -o /tmp/coolify_out.txt -w "%{http_code}" \
            -X GET "${WEBHOOK_URL}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json")
          cat /tmp/coolify_out.txt
          echo ""
          echo "HTTP status: ${response}"
          if [ "${response}" -lt 200 ] || [ "${response}" -ge 300 ]; then
            echo "::error::Coolify backend webhook returned unexpected status: ${response}"
            exit 1
          fi

      - name: Trigger Coolify SymPy webhook
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_SYMPY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "COOLIFY_SYMPY_WEBHOOK_URL not configured — skipping SymPy redeploy."
            exit 0
          fi
          response=$(curl -s -o /tmp/coolify_sympy.txt -w "%{http_code}" \
            -X GET "${WEBHOOK_URL}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json")
          cat /tmp/coolify_sympy.txt
          echo ""
          echo "HTTP status: ${response}"
          if [ "${response}" -lt 200 ] || [ "${response}" -ge 300 ]; then
            echo "::warning::SymPy webhook returned unexpected status: ${response}"
          fi

      - name: Write job summary
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          COMMIT_SHA: ${{ github.sha }}
          TRIGGERED_BY: ${{ github.actor }}
        run: |
          {
            echo "## Backend Deployed"
            echo "| | |"
            echo "|---|---|"
            echo "| **Drupal image** | \`ghcr.io/${REPO_OWNER}/verscienta-backend:latest\` |"
            echo "| **SymPy image** | \`ghcr.io/${REPO_OWNER}/verscienta-sympy:latest\` |"
            echo "| **Commit** | \`${COMMIT_SHA}\` |"
            echo "| **Triggered by** | ${TRIGGERED_BY} |"
          } >> "$GITHUB_STEP_SUMMARY"
