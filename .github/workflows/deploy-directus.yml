name: Deploy Directus

on:
  push:
    branches: [main]
    paths:
      - 'directus/**'
      - '.github/workflows/deploy-directus.yml'

concurrency:
  group: deploy-directus
  cancel-in-progress: true

jobs:
  # --- 1. Build and push Directus image ----------------------------------------
  build-directus:
    name: Build & Push Directus Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/verscienta-directus
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./directus
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- 2. Build and push SymPy (same as before) --------------------------------
  build-sympy:
    name: Build & Push SymPy Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/verscienta-sympy
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./services/sympy-compute
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- 3. Trigger Coolify to redeploy ------------------------------------------
  deploy:
    name: Trigger Coolify Deployment
    runs-on: ubuntu-latest
    needs: [build-directus, build-sympy]
    environment: production

    steps:
      - name: Trigger Coolify Directus webhook
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_DIRECTUS_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          response=$(curl -s -o /tmp/coolify_out.txt -w "%{http_code}" \
            -X GET "${WEBHOOK_URL}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json")
          cat /tmp/coolify_out.txt
          echo "HTTP status: ${response}"
          if [ "${response}" -lt 200 ] || [ "${response}" -ge 300 ]; then
            echo "::error::Coolify Directus webhook failed: ${response}"
            exit 1
          fi

      - name: Trigger Coolify SymPy webhook
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_SYMPY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "${WEBHOOK_URL}" ]; then
            echo "COOLIFY_SYMPY_WEBHOOK_URL not configured — skipping."
            exit 0
          fi
          curl -s -X GET "${WEBHOOK_URL}" -H "Authorization: Bearer ${COOLIFY_TOKEN}" || true

      - name: Write job summary
        run: |
          {
            echo "## Backend Deployed (Directus)"
            echo "| | |"
            echo "|---|---|"
            echo "| **Directus image** | \`ghcr.io/${{ github.repository_owner }}/verscienta-directus:latest\` |"
            echo "| **SymPy image** | \`ghcr.io/${{ github.repository_owner }}/verscienta-sympy:latest\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Triggered by** | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
