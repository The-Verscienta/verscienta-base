name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

# Cancel in-progress deploys when a newer push arrives
concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  # ─── 1. Gate: lint + unit tests before building ─────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test -- --ci --no-coverage

  # ─── 2. Build Docker image and push to GHCR ─────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/verscienta-frontend
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_DRUPAL_BASE_URL=${{ secrets.NEXT_PUBLIC_DRUPAL_BASE_URL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            NEXT_PUBLIC_ALGOLIA_APP_ID=${{ secrets.NEXT_PUBLIC_ALGOLIA_APP_ID }}
            NEXT_PUBLIC_ALGOLIA_SEARCH_API_KEY=${{ secrets.NEXT_PUBLIC_ALGOLIA_SEARCH_API_KEY }}
            NEXT_PUBLIC_KNOWLEDGE_GRAPH=${{ vars.NEXT_PUBLIC_KNOWLEDGE_GRAPH }}
            NEXT_PUBLIC_SYMBOLIC_FEATURE=${{ vars.NEXT_PUBLIC_SYMBOLIC_FEATURE }}
          # GitHub Actions cache — dramatically speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Trigger Coolify to pull and redeploy ────────────────────────────────
  deploy:
    name: Trigger Coolify Deployment
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Trigger Coolify webhook
        env:
          WEBHOOK_URL: ${{ secrets.COOLIFY_FRONTEND_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          response=$(curl -s -o /tmp/coolify_out.txt -w "%{http_code}" \
            -X GET "${WEBHOOK_URL}" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json")
          cat /tmp/coolify_out.txt
          echo ""
          echo "HTTP status: ${response}"
          if [ "${response}" -lt 200 ] || [ "${response}" -ge 300 ]; then
            echo "::error::Coolify webhook returned unexpected status: ${response}"
            exit 1
          fi

      - name: Write job summary
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          COMMIT_SHA: ${{ github.sha }}
          TRIGGERED_BY: ${{ github.actor }}
        run: |
          {
            echo "## Frontend Deployed"
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`ghcr.io/${REPO_OWNER}/verscienta-frontend:latest\` |"
            echo "| **Commit** | \`${COMMIT_SHA}\` |"
            echo "| **Triggered by** | ${TRIGGERED_BY} |"
          } >> "$GITHUB_STEP_SUMMARY"
