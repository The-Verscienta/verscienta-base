name: Weekly Drupal Update

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Also runnable manually from the Actions tab

jobs:
  update:
    name: composer update
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the commit back to main

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd, zip, pdo_mysql, mbstring, bcmath, opcache
          coverage: none

      - name: Run composer update
        working-directory: backend
        run: composer update --with-all-dependencies --no-interaction 2>&1

      - name: Check for changes
        id: diff
        run: |
          git add backend/composer.lock backend/web/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ All packages already up to date — nothing to commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "📦 Updates found:"
            git diff --staged --stat
          fi

      - name: Commit and push updates
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: auto-update Drupal packages $(date +%Y-%m-%d)

          Automated weekly composer update.
          Triggers the regular build + Coolify deployment pipeline."
          git push

      - name: Write job summary
        if: always()
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "## ✅ Drupal updated — deployment triggered" >> "$GITHUB_STEP_SUMMARY"
            echo "A new image will be built and pushed to Coolify automatically." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ℹ️ No updates available" >> "$GITHUB_STEP_SUMMARY"
            echo "All Drupal packages were already at their latest versions." >> "$GITHUB_STEP_SUMMARY"
          fi
