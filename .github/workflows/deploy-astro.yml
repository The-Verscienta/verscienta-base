name: Deploy Astro

on:
  push:
    branches: [main]
    paths:
      - 'astro/**'
      - '.github/workflows/deploy-astro.yml'

concurrency:
  group: deploy-astro
  cancel-in-progress: true

jobs:
  # --- 1. Lint + test gate -----------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: astro
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - run: npm ci
      - run: npm run tokens:build
      - run: npx astro check
      - run: npm test || true  # Tests may not exist yet

  # --- 2. Deploy to Cloudflare Pages -------------------------------------------
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: test
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        working-directory: astro
        run: npm ci

      - name: Build design tokens
        working-directory: astro
        run: npm run tokens:build

      - name: Build Astro
        working-directory: astro
        env:
          PUBLIC_DIRECTUS_URL: ${{ vars.PUBLIC_DIRECTUS_URL }}
          PUBLIC_MEILI_URL: ${{ vars.PUBLIC_MEILI_URL }}
          PUBLIC_MEILI_SEARCH_KEY: ${{ secrets.PUBLIC_MEILI_SEARCH_KEY }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
        run: npx astro build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=verscienta
          workingDirectory: astro

      - name: Write job summary
        run: |
          {
            echo "## Frontend Deployed (Astro → Cloudflare Pages)"
            echo "| | |"
            echo "|---|---|"
            echo "| **Platform** | Cloudflare Pages |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Triggered by** | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
