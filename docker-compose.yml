services:
  db:
    image: mariadb:11
    container_name: verscienta_db
    environment:
      MYSQL_DATABASE: ${DRUPAL_DATABASE_NAME:-verscienta_drupal}
      MYSQL_USER: ${DRUPAL_DATABASE_USER:-drupal_user}
      MYSQL_PASSWORD: ${DRUPAL_DATABASE_PASSWORD:-drupal_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    ports:
      - "3306:3306"
    networks:
      - verscienta_network

  redis:
    image: redis:7-alpine
    container_name: verscienta_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - verscienta_network

  drupal:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verscienta_drupal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DRUPAL_DATABASE_HOST: db
      DRUPAL_DATABASE_PORT: "3306"
      DRUPAL_DATABASE_NAME: ${DRUPAL_DATABASE_NAME:-verscienta_drupal}
      DRUPAL_DATABASE_USER: ${DRUPAL_DATABASE_USER:-drupal_user}
      DRUPAL_DATABASE_PASSWORD: ${DRUPAL_DATABASE_PASSWORD:-drupal_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - drupal_files:/var/www/html/web/sites/default/files
    networks:
      - verscienta_network

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: verscienta_dragonfly
    ports:
      - "6380:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      - verscienta_network

  sympy-compute:
    build:
      context: ./services/sympy-compute
      dockerfile: Dockerfile
    container_name: verscienta_sympy
    depends_on:
      - dragonfly
    environment:
      CACHE_URL: redis://dragonfly:6379/0
      API_KEY: ${SYMPY_API_KEY:-changeme}
      LOG_LEVEL: ${SYMPY_LOG_LEVEL:-info}
    ports:
      - "8001:8000"
    networks:
      - verscienta_network

volumes:
  db_data:
  redis_data:
  drupal_files:
  dragonfly_data:

networks:
  verscienta_network:
    driver: bridge