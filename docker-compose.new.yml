# Verscienta Health — Production Docker Compose (Directus + Astro migration)
#
# Architecture:
#   - Astro frontend → Cloudflare Pages (not in this file)
#   - Directus API   → this Docker Compose on Coolify
#
# Services: directus, db, redis, meilisearch, dragonfly, sympy-compute, nginx

services:
  # ── Directus CMS (replaces Drupal) ──────────────────────────────────────────
  directus:
    image: ghcr.io/${REPO_OWNER:-verscienta}/verscienta-directus:latest
    container_name: verscienta_directus
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-verscienta_directus}
      DB_USER: ${DB_USER:-directus}
      DB_PASSWORD: ${DB_PASSWORD}

      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      CACHE_REDIS_HOST: redis
      CACHE_REDIS_PORT: "6379"
      CACHE_AUTO_PURGE: "true"

      CORS_ENABLED: "true"
      CORS_ORIGIN: "https://verscienta.com,https://api.verscienta.com"
      CORS_CREDENTIALS: "true"

      RATE_LIMITER_ENABLED: "true"
      RATE_LIMITER_STORE: redis
      RATE_LIMITER_REDIS_HOST: redis

      PUBLIC_URL: https://api.verscienta.com
      LOG_LEVEL: warn

      STORAGE_LOCATIONS: local
      STORAGE_LOCAL_DRIVER: local
      STORAGE_LOCAL_ROOT: /directus/uploads

      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    expose:
      - "8055"
    volumes:
      - directus_uploads:/directus/uploads
    networks:
      - edge
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8055/server/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── MariaDB (same as before) ────────────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: verscienta_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-verscienta_directus}
      MYSQL_USER: ${DB_USER:-directus}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── Redis (cache + rate limiting) ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: verscienta_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ── MeiliSearch (replaces Algolia) ──────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: verscienta_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ── DragonflyDB (SymPy compute cache) ──────────────────────────────────────
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: verscienta_dragonfly
    restart: unless-stopped
    command: dragonfly --maxmemory=256mb --proactor_threads=1
    volumes:
      - dragonfly_data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ── SymPy Compute (dosage calculations) ────────────────────────────────────
  sympy-compute:
    image: ghcr.io/${REPO_OWNER:-verscienta}/verscienta-sympy:latest
    container_name: verscienta_sympy
    restart: unless-stopped
    depends_on:
      - dragonfly
    environment:
      CACHE_URL: redis://dragonfly:6379/0
      API_KEY: ${SYMPY_API_KEY}
      LOG_LEVEL: warning
    expose:
      - "8000"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Nginx reverse proxy (API subdomain only) ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: verscienta_nginx
    restart: unless-stopped
    depends_on:
      - directus
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/verscienta-new.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - edge
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  db_data:
  redis_data:
  meili_data:
  dragonfly_data:
  directus_uploads:
  nginx_logs:

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true
