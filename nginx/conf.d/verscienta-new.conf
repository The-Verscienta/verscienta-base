# Verscienta Health — nginx reverse proxy (Directus + Astro migration)
#
# Architecture:
#   - verscienta.com      → Cloudflare Pages (no nginx needed)
#   - api.verscienta.com  → Directus (port 8055)
#
# This config only handles the API subdomain since the frontend
# is served by Cloudflare Pages edge network.
#
# To use: replace verscienta.conf with this file after migration.

upstream directus {
    server directus:8055;
    keepalive 16;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.verscienta.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Directus API (api.verscienta.com) ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.verscienta.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Max upload size for media
    client_max_body_size 64M;

    # ── Directus REST/GraphQL API ─────────────────────────────────────────────
    location / {
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Directus is fast — shorter timeouts than Drupal
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ── Directus assets (uploaded files) — cached ─────────────────────────────
    location /assets/ {
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # ── Directus admin UI — no cache ──────────────────────────────────────────
    location /admin/ {
        proxy_pass http://directus;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types application/json text/plain application/javascript;
}
