# Verscienta Health — nginx reverse proxy configuration
#
# Upstream services (Docker internal hostnames)
# - frontend:3000  → Next.js app (verscienta.com)
# - drupal:80      → Drupal JSON:API (api.verscienta.com)
#
# SSL: place your certificates at:
#   nginx/ssl/fullchain.pem
#   nginx/ssl/privkey.pem
# Let's Encrypt with certbot or Coolify's built-in Traefik handle this automatically.

upstream nextjs {
    server frontend:3000;
    keepalive 32;
}

upstream drupal {
    server drupal:80;
    keepalive 16;
}

# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name verscienta.com www.verscienta.com api.verscienta.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Frontend (verscienta.com) ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name verscienta.com www.verscienta.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (enable after confirming HTTPS works)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Redirect www to apex
    if ($host = www.verscienta.com) {
        return 301 https://verscienta.com$request_uri;
    }

    # ── Next.js static assets — long cache, immutable ─────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Public static files ────────────────────────────────────────────────────
    location /images/ {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    # ── All other traffic to Next.js ──────────────────────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer settings for streaming (Next.js SSR)
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/css
        text/javascript
        text/xml
        text/plain
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml;
}

# ─── Backend / Drupal API (api.verscienta.com) ────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.verscienta.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;

    # Max upload size for Drupal file uploads
    client_max_body_size 64M;

    # ── JSON:API + REST endpoints ─────────────────────────────────────────────
    location / {
        proxy_pass http://drupal;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — Drupal can be slow on cache miss
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 64k;
    }

    # ── Drupal files (media uploads) — cached at nginx layer ─────────────────
    location ~* ^/sites/default/files/(.+)$ {
        proxy_pass http://drupal;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # ── Block direct access to sensitive paths ─────────────────────────────────
    location ~* \.(engine|inc|install|make|module|profile|po|sh|.*sql|theme|twig|tpl(\.php)?|xtmpl|yml)(~|\.sw[op]|\.bak|\.orig|\.save)?$|^(\.(?!well-known).*|Entries.*|Repository|Root|Tag|Template|composer\.(json|lock)|web\.config)$ {
        return 404;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/vnd.api+json text/plain;
}
