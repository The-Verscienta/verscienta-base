# Cloudflare Pages configuration for Verscienta Astro frontend
# Deploy: npx wrangler pages deploy dist/

name = "verscienta"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
PUBLIC_SITE_URL = "https://verscienta.com"

# KV namespace for rate limiting (create via Cloudflare dashboard)
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "your-kv-namespace-id"

# Environment-specific settings are configured in Cloudflare dashboard:
# - PUBLIC_DIRECTUS_URL
# - PUBLIC_MEILI_URL
# - PUBLIC_MEILI_SEARCH_KEY
# - PUBLIC_TURNSTILE_SITE_KEY
# - XAI_API_KEY (secret)
# - TURNSTILE_SECRET_KEY (secret)
# - SYMPY_SERVICE_URL (secret)
# - SYMPY_API_KEY (secret)
# - CSRF_SECRET (secret)
# - DIRECTUS_TOKEN (secret)
