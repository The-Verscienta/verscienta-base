verscienta_oidc_discovery.openid_configuration:
  path: '/.well-known/openid-configuration'
  defaults:
    _controller: '\Drupal\verscienta_oidc_discovery\Controller\OidcDiscoveryController::discovery'
  requirements:
    _access: 'TRUE'

verscienta_oidc_discovery.logout:
  path: '/oauth/logout'
  defaults:
    _controller: '\Drupal\verscienta_oidc_discovery\Controller\OidcDiscoveryController::logout'
  requirements:
    _access: 'TRUE'
