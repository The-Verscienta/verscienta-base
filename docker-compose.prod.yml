# Production docker-compose — uses pre-built images from GHCR.
# For Coolify deployments, configure services individually in the Coolify UI
# (see COOLIFY-DEPLOYMENT.md). This file is for self-hosted VPS deployments
# behind a reverse proxy, or for smoke-testing production images locally.
#
# Usage:
#   cp .env.example .env.prod && nano .env.prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Secrets: set GHCR_TOKEN to a GitHub PAT with read:packages scope, then:
#   echo $GHCR_TOKEN | docker login ghcr.io -u <github-username> --password-stdin

name: verscienta-prod

services:
  # ─── Reverse proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: verscienta_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      drupal:
        condition: service_healthy
    networks:
      - edge
    deploy:
      resources:
        limits:
          memory: 128M

  # ─── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/the-verscienta/verscienta-frontend:latest
    container_name: verscienta_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      # Runtime-only secrets (not baked into the image)
      DRUPAL_CLIENT_ID: ${DRUPAL_CLIENT_ID}
      DRUPAL_CLIENT_SECRET: ${DRUPAL_CLIENT_SECRET}
      XAI_API_KEY: ${XAI_API_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      ALGOLIA_ADMIN_API_KEY: ${ALGOLIA_ADMIN_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SYMPY_SERVICE_URL: ${SYMPY_SERVICE_URL:-http://sympy-compute:8000}
      SYMPY_API_KEY: ${SYMPY_API_KEY}
      CSRF_SECRET: ${CSRF_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      drupal:
        condition: service_healthy
    networks:
      - edge
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Drupal backend ──────────────────────────────────────────────────────────
  drupal:
    image: ghcr.io/the-verscienta/verscienta-backend:latest
    container_name: verscienta_drupal
    restart: unless-stopped
    expose:
      - "80"
    environment:
      DRUPAL_DATABASE_HOST: db
      DRUPAL_DATABASE_PORT: "3306"
      DRUPAL_DATABASE_NAME: ${DRUPAL_DATABASE_NAME:-verscienta_drupal}
      DRUPAL_DATABASE_USER: ${DRUPAL_DATABASE_USER:-drupal_user}
      DRUPAL_DATABASE_PASSWORD: ${DRUPAL_DATABASE_PASSWORD}
      DRUPAL_HASH_SALT: ${DRUPAL_HASH_SALT}
      TRUSTED_HOST_PATTERNS: ${TRUSTED_HOST_PATTERNS:-^api\\.verscienta\\.com$}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - drupal_files:/var/www/html/web/sites/default/files
      - drupal_private:/var/www/html/private
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/jsonapi"]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - edge
      - internal
    deploy:
      resources:
        limits:
          memory: 1G

  # ─── MariaDB database ─────────────────────────────────────────────────────────
  db:
    image: mariadb:11
    container_name: verscienta_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DRUPAL_DATABASE_NAME:-verscienta_drupal}
      MYSQL_USER: ${DRUPAL_DATABASE_USER:-drupal_user}
      MYSQL_PASSWORD: ${DRUPAL_DATABASE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    # Not exposed externally — access only via internal network
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── Redis (Drupal cache + sessions) ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: verscienta_redis
    restart: unless-stopped
    # Evict LRU keys when full; disable RDB persistence (cache only)
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── DragonflyDB (SymPy compute cache) ────────────────────────────────────────
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: verscienta_dragonfly
    restart: unless-stopped
    command: dragonfly --maxmemory=256mb --save_schedule ""
    volumes:
      - dragonfly_data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M

  # ─── SymPy compute microservice ───────────────────────────────────────────────
  sympy-compute:
    image: ghcr.io/the-verscienta/verscienta-sympy:latest
    container_name: verscienta_sympy
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      CACHE_URL: redis://dragonfly:6379/0
      API_KEY: ${SYMPY_API_KEY}
      LOG_LEVEL: ${SYMPY_LOG_LEVEL:-info}
    depends_on:
      - dragonfly
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  db_data:
  redis_data:
  dragonfly_data:
  drupal_files:
  drupal_private:
  nginx_logs:

networks:
  # edge: nginx talks to frontend + drupal
  edge:
    driver: bridge
  # internal: db, redis, dragonfly, sympy — never exposed to host
  internal:
    driver: bridge
    internal: true
